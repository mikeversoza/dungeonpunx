<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Map — Depths Below</title>
<link rel="stylesheet" href="shared.css">
<style>
.map-container { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
.map-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
}
.map-toolbar h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); }

.map-area {
  flex: 1;
  background: radial-gradient(ellipse at center, #1a1520 0%, #0d0a10 100%);
  border: 2px solid rgba(201,162,39,0.3);
  border-radius: 2px;
  position: relative;
  overflow: auto;
  min-height: 500px;
}

.map-canvas-wrap {
  position: relative;
  min-width: 800px;
  min-height: 600px;
  padding: 2rem;
}

svg.map-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.map-room {
  position: absolute;
  width: 120px;
  min-height: 70px;
  border: 2px solid rgba(201,162,39,0.4);
  background: rgba(20,16,28,0.95);
  padding: 0.5rem;
  cursor: pointer;
  transition: all 0.2s;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}
.map-room:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,162,39,0.25); }
.map-room.current-room { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,162,39,0.4); background: rgba(40,30,50,0.98); }
.map-room.cleared { border-color: var(--emerald-bright); }
.map-room.boss-room { border-color: var(--blood-bright); }
.map-room.start-room { border-color: #7b68ee; }
.map-room.fog { background: rgba(10,8,14,0.97); border-color: rgba(80,70,100,0.3); cursor: default; }
.map-room.fog:hover { border-color: rgba(80,70,100,0.3); box-shadow: none; }

.room-icon { font-size: 1.2rem; margin-bottom: 2px; }
.room-map-name { font-family: 'Cinzel', serif; font-size: 0.62rem; color: var(--parchment); line-height: 1.3; letter-spacing: 0.03em; }
.room-map-type { font-size: 0.58rem; color: var(--stone-light); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
.room-map-badge { font-size: 0.55rem; margin-top: 3px; }

.fog-label { font-family: 'Cinzel', serif; font-size: 0.65rem; color: rgba(100,90,120,0.5); letter-spacing: 0.1em; }

.map-legend {
  display: flex; flex-wrap: wrap; gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: rgba(0,0,0,0.4);
  border-top: 1px solid rgba(201,162,39,0.15);
}
.legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--stone-light); }
.legend-dot { width: 12px; height: 12px; border: 2px solid currentColor; flex-shrink: 0; }

.room-tooltip {
  position: fixed;
  background: linear-gradient(135deg, #1e1828, #14101c);
  border: 1px solid var(--gold);
  padding: 0.75rem 1rem;
  max-width: 260px;
  z-index: 200;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  font-size: 0.82rem;
  display: none;
}
.tooltip-name { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 0.3rem; font-size: 0.9rem; }
.tooltip-desc { color: var(--stone-light); font-style: italic; line-height: 1.5; }

.dm-toggle-btn {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 2px solid var(--torch);
  background: transparent;
  color: var(--torch);
  cursor: pointer;
  transition: all 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.dm-toggle-btn.active { background: rgba(255,107,26,0.2); }
.dm-toggle-btn:hover { background: rgba(255,107,26,0.15); }

.no-game-msg {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem; color: var(--stone-light);
}
.no-game-msg p { font-style: italic; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">⚔ Depths Below</a>
  <a href="index.html">Adventure</a>
  <a href="characters.html">Characters</a>
  <a href="map.html" class="active">Map</a>
  <a href="rooms.html">Room Editor</a>
</nav>

<div class="map-container">
  <div class="map-toolbar">
    <div>
      <h1>🗺 Dungeon Map</h1>
      <div style="color:var(--stone-light);font-size:0.82rem;font-style:italic" id="mapSubtitle">Loading...</div>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center">
      <button class="dm-toggle-btn" id="dmToggleBtn" onclick="toggleDMMode()">
        <span id="dmEye">👁</span> DM View
      </button>
      <button class="btn btn-sm" onclick="window.location.href='index.html'">← Back to Game</button>
    </div>
  </div>

  <div id="noGameMsg" class="no-game-msg" style="display:none">
    <div style="font-size:3rem">🗺</div>
    <p>No active dungeon run. Start an adventure to see the map!</p>
    <button class="btn btn-success" onclick="window.location.href='index.html'">Begin Adventure</button>
  </div>

  <div id="mapWrapper" style="display:none;flex:1;display:none;flex-direction:column">
    <div class="map-area" id="mapArea">
      <div class="map-canvas-wrap" id="mapCanvas">
        <svg class="map-svg" id="mapSvg"></svg>
      </div>
    </div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="color:var(--gold)"></div> Current Room</div>
      <div class="legend-item"><div class="legend-dot" style="color:var(--emerald-bright)"></div> Cleared</div>
      <div class="legend-item"><div class="legend-dot" style="color:var(--blood-bright)"></div> Boss Room</div>
      <div class="legend-item"><div class="legend-dot" style="color:#7b68ee"></div> Starting Room</div>
      <div class="legend-item"><div class="legend-dot" style="color:rgba(80,70,100,0.5)"></div> Unexplored</div>
      <div id="legendRooms" style="margin-left:auto;font-family:'Cinzel',serif;font-size:0.75rem;color:var(--stone-light)"></div>
    </div>
  </div>
</div>

<div class="room-tooltip" id="roomTooltip">
  <div class="tooltip-name" id="ttName"></div>
  <div id="ttType" style="font-size:0.7rem;color:var(--stone-light);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.08em"></div>
  <div class="tooltip-desc" id="ttDesc"></div>
  <div id="ttStatus" style="margin-top:0.4rem;font-size:0.72rem"></div>
</div>

<footer>
  <span>Designed by grapebiscuits &nbsp;·&nbsp; <span id="footerDate"></span> &nbsp;·&nbsp; <a href="thanks.html" class="copyright" title="">©</a></span>
</footer>

<script src="engine.js"></script>
<script>
const E = DungeonEngine;
let dmMode = false;
let gameState = null;

document.getElementById('footerDate').textContent = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

function init() {
  if (!E.AUTH.check()) { window.location.href = 'index.html'; return; }
  gameState = E.getState();
  dmMode = gameState.dmMode || false;
  updateDMBtn();

  if (!gameState.started || !gameState.mapRooms || !gameState.mapRooms.length) {
    document.getElementById('noGameMsg').style.display = 'flex';
    document.getElementById('mapWrapper').style.display = 'none';
    document.getElementById('mapSubtitle').textContent = 'No active adventure';
    return;
  }

  document.getElementById('noGameMsg').style.display = 'none';
  document.getElementById('mapWrapper').style.display = 'flex';

  const cleared = gameState.mapRooms.filter(r => r.cleared).length;
  const visited = gameState.mapRooms.filter(r => r.visited).length;
  document.getElementById('mapSubtitle').textContent = `Dungeon Level ${gameState.dungeonLevel} · ${visited} rooms discovered · ${cleared} cleared`;
  document.getElementById('legendRooms').textContent = `${visited}/${gameState.mapRooms.length} rooms found`;

  layoutAndRenderMap();
}

function toggleDMMode() {
  dmMode = !dmMode;
  if (gameState) { gameState.dmMode = dmMode; E.setState(gameState); }
  updateDMBtn();
  layoutAndRenderMap();
}

function updateDMBtn() {
  const btn = document.getElementById('dmToggleBtn');
  if (dmMode) { btn.classList.add('active'); btn.innerHTML = '<span>👁</span> DM View: ON'; }
  else { btn.classList.remove('active'); btn.innerHTML = '<span>🙈</span> DM View: OFF'; }
}

function layoutAndRenderMap() {
  const rooms = gameState.mapRooms;
  if (!rooms || !rooms.length) return;

  // Compute layout positions using a tree/grid approach
  const positions = computeLayout(rooms);
  renderMap(rooms, positions);
}

function computeLayout(rooms) {
  // BFS layout from room 0
  const positions = new Array(rooms.length).fill(null);
  const HGAP = 180, VGAP = 130;
  const visited = new Set();
  const queue = [{idx: 0, col: 0, row: 0}];
  const colRowSet = new Set();

  while (queue.length) {
    const {idx, col, row} = queue.shift();
    if (visited.has(idx)) continue;
    visited.add(idx);

    // Avoid collisions
    let finalRow = row;
    while (colRowSet.has(`${col},${finalRow}`)) finalRow++;
    colRowSet.add(`${col},${finalRow}`);
    positions[idx] = { x: 80 + col * HGAP, y: 80 + finalRow * VGAP };

    const room = rooms[idx];
    const children = (room.connections || []).filter(c => !visited.has(c));
    children.forEach((child, i) => {
      queue.push({ idx: child, col: col + 1, row: finalRow + i });
    });
  }

  // Any unpositioned rooms
  rooms.forEach((r, i) => {
    if (!positions[i]) positions[i] = { x: 80 + (i % 4) * 180, y: 80 + Math.floor(i / 4) * 130 };
  });

  return positions;
}

function renderMap(rooms, positions) {
  const canvas = document.getElementById('mapCanvas');
  const svg = document.getElementById('mapSvg');

  // Calculate canvas size
  const maxX = Math.max(...positions.map(p => p.x)) + 150;
  const maxY = Math.max(...positions.map(p => p.y)) + 110;
  canvas.style.minWidth = maxX + 'px';
  canvas.style.minHeight = maxY + 'px';

  // Draw connections in SVG
  const lines = [];
  rooms.forEach((room, i) => {
    (room.connections || []).forEach(j => {
      if (j > i) { // draw each connection once
        const from = positions[i], to = positions[j];
        const fromVis = dmMode || room.visited;
        const toVis = dmMode || rooms[j].visited;
        if (fromVis || toVis) {
          lines.push(`<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}"
            stroke="${fromVis && toVis ? 'rgba(201,162,39,0.35)' : 'rgba(80,70,100,0.2)'}"
            stroke-width="2" stroke-dasharray="${fromVis && toVis ? 'none' : '6,4'}"/>`);
        }
      }
    });
  });
  svg.innerHTML = lines.join('');

  // Remove old room elements
  canvas.querySelectorAll('.map-room').forEach(el => el.remove());

  // Type icons
  const typeIcons = { combat:'⚔',puzzle:'🔮',treasure:'💰',exploration:'🔍',boss:'💀',social:'💬' };

  rooms.forEach((room, i) => {
    const pos = positions[i];
    const isVisible = dmMode || room.visited;
    const isCurrent = gameState.currentRoom === i;

    const div = document.createElement('div');
    div.className = [
      'map-room',
      isCurrent ? 'current-room' : '',
      room.cleared ? 'cleared' : '',
      room.isBoss ? 'boss-room' : '',
      room.isStart ? 'start-room' : '',
      !isVisible ? 'fog' : ''
    ].filter(Boolean).join(' ');

    div.style.left = pos.x + 'px';
    div.style.top = pos.y + 'px';

    if (!isVisible) {
      div.innerHTML = `<div class="fog-label">???</div>`;
    } else {
      div.innerHTML = `
        <div class="room-icon">${typeIcons[room.type] || '🚪'}</div>
        <div class="room-map-name">${room.name}</div>
        <div class="room-map-type">${room.type}</div>
        <div class="room-map-badge">
          ${room.cleared ? '<span style="color:var(--emerald-bright)">✓</span>' : ''}
          ${isCurrent ? '<span style="color:var(--gold)">★</span>' : ''}
          ${room.isStart ? '<span style="color:#7b68ee">⚑</span>' : ''}
          ${room.isBoss ? '<span style="color:var(--blood-bright)">☠</span>' : ''}
        </div>
      `;
      div.addEventListener('mouseenter', (e) => showTooltip(room, e));
      div.addEventListener('mousemove', (e) => moveTooltip(e));
      div.addEventListener('mouseleave', hideTooltip);
      div.addEventListener('click', () => {
        if (dmMode) {
          alert(`[DM] Room ${i+1}: ${room.name}\n\n${room.description}\n\nCleared: ${room.cleared ? 'Yes' : 'No'}`);
        }
      });
    }
    canvas.appendChild(div);
  });
}

function showTooltip(room, e) {
  const tt = document.getElementById('roomTooltip');
  document.getElementById('ttName').textContent = room.name;
  document.getElementById('ttType').textContent = room.type;
  document.getElementById('ttDesc').textContent = room.description;
  document.getElementById('ttStatus').innerHTML = [
    room.cleared ? '<span style="color:var(--emerald-bright)">✓ Cleared</span>' : '',
    room.isStart ? '<span style="color:#7b68ee">⚑ Starting Room</span>' : '',
    room.isBoss ? '<span style="color:var(--blood-bright)">☠ Boss Room</span>' : '',
    gameState.currentRoom === gameState.mapRooms.indexOf(room) ? '<span style="color:var(--gold)">★ Current Location</span>' : ''
  ].filter(Boolean).join(' · ');
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('roomTooltip');
  const x = e.clientX + 16, y = e.clientY - 10;
  tt.style.left = Math.min(x, window.innerWidth - 280) + 'px';
  tt.style.top = Math.min(y, window.innerHeight - 180) + 'px';
}

function hideTooltip() {
  document.getElementById('roomTooltip').style.display = 'none';
}

init();
</script>
</body>
</html>
